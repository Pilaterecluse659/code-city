<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude City — Your Codebase in 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; }
  canvas { display: block; }

  /* Loading screen */
  #loading {
    position: fixed; inset: 0; background: #0a0a1a; z-index: 1000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #7aa2f7; font-size: 18px; transition: opacity 0.5s;
  }
  #loading.hide { opacity: 0; pointer-events: none; }
  #loading h1 { font-size: 36px; margin-bottom: 8px; }
  #loading h1 span { color: #f0883e; }
  #loading p { color: #565f89; font-size: 14px; }
  .loader { width: 40px; height: 40px; border: 3px solid #222; border-top-color: #7aa2f7;
    border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Top bar */
  #top-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 44px; z-index: 100;
    background: rgba(10,10,26,0.85); backdrop-filter: blur(10px);
    border-bottom: 1px solid #1a1a3e; display: flex; align-items: center;
    justify-content: space-between; padding: 0 16px;
  }
  .top-left { display: flex; align-items: center; gap: 16px; }
  .city-name { color: #7aa2f7; font-size: 16px; font-weight: 700; }
  .stat { color: #565f89; font-size: 12px; }
  .top-right { display: flex; gap: 6px; }
  .ctrl-btn {
    background: rgba(30,30,50,0.8); border: 1px solid #2a2a4a; border-radius: 6px;
    color: #aaa; font-size: 16px; padding: 4px 8px; cursor: pointer;
    transition: background 0.2s;
  }
  .ctrl-btn:hover { background: rgba(50,50,80,0.8); }

  /* Tooltip */
  #tooltip {
    position: fixed; z-index: 200; background: rgba(15,15,30,0.95); backdrop-filter: blur(8px);
    border: 1px solid #2a2a5a; border-radius: 8px; padding: 12px 16px;
    pointer-events: none; max-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .tt-name { color: #c0caf5; font-size: 14px; font-weight: 700; }
  .tt-path { color: #565f89; font-size: 11px; margin-bottom: 8px; word-break: break-all; }
  .tt-row { display: flex; justify-content: space-between; color: #8b949e; font-size: 12px; margin: 2px 0; }
  .tt-row strong { color: #c0caf5; }
  .tt-test { color: #9ece6a; font-size: 11px; margin-top: 6px; }
  .tt-bug { color: #f7768e; font-size: 11px; margin-top: 2px; }

  /* Legend */
  #legend {
    position: fixed; bottom: 16px; left: 16px; z-index: 100;
    background: rgba(15,15,30,0.85); backdrop-filter: blur(8px);
    border: 1px solid #2a2a4a; border-radius: 8px; padding: 12px 16px;
  }
  .legend-title { color: #565f89; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .legend-item { color: #8b949e; font-size: 12px; display: flex; align-items: center; gap: 6px; margin: 3px 0; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

  /* Activity feed */
  #activity-feed {
    position: fixed; bottom: 16px; right: 16px; z-index: 100;
    background: rgba(15,15,30,0.85); backdrop-filter: blur(8px);
    border: 1px solid #2a2a4a; border-radius: 8px; padding: 12px 16px;
    max-width: 280px; max-height: 200px; overflow-y: auto;
  }
  .feed-title { color: #565f89; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .feed-item { color: #8b949e; font-size: 11px; padding: 3px 0; border-bottom: 1px solid #1a1a3a; }
  .feed-item:last-child { border-bottom: none; }

  /* Help text */
  #help-text {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 100;
    color: #3a3a5a; font-size: 11px; pointer-events: none;
  }
</style>
</head>
<body>

<div id="loading">
  <h1><span>$</span> Claude City</h1>
  <p>Building your codebase...</p>
  <div class="loader"></div>
</div>

<div id="help-text">Click building for details · Scroll to zoom · Drag to rotate · R to reset camera</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { City } from './city.js';
import { AgentManager } from './agents.js';
import { EffectsManager } from './effects.js';
import { CityControls } from './controls.js';

// --- Init ---
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);

// --- Load Data ---
async function loadData() {
  try {
    const response = await fetch('./city-data.json');
    if (!response.ok) throw new Error('No city-data.json found');
    return await response.json();
  } catch (e) {
    console.warn('Using demo data:', e.message);
    return generateDemoData();
  }
}

function generateDemoData() {
  const languages = ['typescript', 'javascript', 'python', 'rust', 'go'];
  const colors = { typescript: '#3178c6', javascript: '#f7df1e', python: '#3572A5', rust: '#dea584', go: '#00ADD8' };
  const folders = ['src', 'lib', 'utils', 'api', 'components', 'models', 'services', 'tests'];
  const tree = [];

  for (const folder of folders) {
    const files = [];
    const count = 5 + Math.floor(Math.random() * 15);
    for (let i = 0; i < count; i++) {
      const lang = languages[Math.floor(Math.random() * languages.length)];
      const ext = { typescript: '.ts', javascript: '.js', python: '.py', rust: '.rs', go: '.go' }[lang];
      files.push({
        name: `${folder}-${i}${ext}`,
        type: 'file',
        path: `${folder}/${folder}-${i}${ext}`,
        metrics: {
          loc: 20 + Math.floor(Math.random() * 500),
          language: lang,
          color: colors[lang],
          churn: Math.floor(Math.random() * 30),
          bug_count: Math.random() > 0.8 ? Math.floor(Math.random() * 5) : 0,
          last_author: ['manavarya', 'alice', 'bob', 'charlie'][Math.floor(Math.random() * 4)],
          is_test: folder === 'tests',
          age_days: Math.floor(Math.random() * 90)
        }
      });
    }
    tree.push({ name: folder, type: 'directory', path: folder, children: files });
  }

  return {
    name: 'demo-project',
    generated: new Date().toISOString(),
    stats: { files: 80, directories: 8, loc: 15000, commits: 450, contributors: 4, languages: { typescript: 30, javascript: 20, python: 15, rust: 10, go: 5 }, dependency_edges: 45 },
    contributors: [{ name: 'manavarya', commits: 200 }, { name: 'alice', commits: 120 }, { name: 'bob', commits: 80 }, { name: 'charlie', commits: 50 }],
    tree,
    dependencies: [],
    recent_activity: [
      { file: 'src/auth.ts', author: 'manavarya', type: 'edit', time: new Date().toISOString() },
      { file: 'api/routes.ts', author: 'alice', type: 'edit', time: new Date().toISOString() },
      { file: 'lib/db.py', author: 'bob', type: 'edit', time: new Date().toISOString() }
    ],
    agents: []
  };
}

// --- Main ---
async function main() {
  const data = await loadData();

  // Build city
  const city = new City(scene, data);
  city.build();

  // Effects
  const effects = new EffectsManager(scene);
  effects.createAtmosphere();
  effects.addBugFires(city.buildings);
  effects.addNewFeatureSparkles(city.buildings);

  // Agents
  const agents = new AgentManager(scene, city);
  // Spawn demo agents based on contributors
  const contributors = data.contributors || [];
  for (let i = 0; i < Math.min(contributors.length, 4); i++) {
    const agent = agents.createAgent(i, contributors[i].name);
    // Send to random building
    if (city.buildings.length > 0) {
      const randomBuilding = city.buildings[Math.floor(Math.random() * city.buildings.length)];
      agents.setTarget(agent, randomBuilding.data.path);
    }
  }

  // Controls
  const controls = new CityControls(camera, renderer, city, data);
  controls.bindButtons(effects);

  // Hide loading screen
  document.getElementById('loading').classList.add('hide');
  setTimeout(() => document.getElementById('loading').remove(), 500);

  // --- Animation Loop ---
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.05);
    const time = clock.getElapsedTime();

    city.update(time);
    effects.update(time, delta);
    agents.update(time, delta);
    controls.update();

    renderer.render(scene, camera);
  }

  animate();
}

main();
</script>
</body>
</html>
